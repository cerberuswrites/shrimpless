    <div id="options">
  <input type="checkbox" id="br-tags" name="br-tags" value="br-tags-true" />
  <label for="br-tags"> add &lt;br&gt;&lt;br&gt; tags for paragraph breaks</label><br />
  <input type="checkbox" id="hr-tags" name="hr-tags" value="hr-tags-true" checked/>
  <label for="hr-tags"> add &lt;hr&gt; tags for horizontal dividers (replaces ---)</label><br />
  <input type="checkbox" id="vr-tags" name="vr-tags" value="vr-tags-true" checked/>
  <label for="vr-tags"> add vertical divider tags (replaces ///)</label><br />
  <input type="checkbox" id="right-tags" name="right-tags" value="right-tags-true" checked/>
  <label for="right-tags"> align selected text to right (replaces //)</label><br />

  <label for="post-template2"> wrap in posting template (sunstrike)</label><br />
</div>
